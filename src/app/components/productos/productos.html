<app-action-bar [title]="tituloPantalla">
  
  <div ngbDropdown class="d-inline-block me-2">
    <button class="btn btn-outline-secondary" id="dropdownGestionar" ngbDropdownToggle>
      Gestionar...
    </button>
    <div ngbDropdownMenu aria-labelledby="dropdownGestionar">
      <button ngbDropdownItem (click)="cambiarVista('PRODUCTOS')">Ver Productos</button>
      <div class="dropdown-divider"></div>
      <button ngbDropdownItem (click)="cambiarVista('CATEGORIAS')">Categorías</button>
      <button ngbDropdownItem (click)="cambiarVista('INSUMOS')">Insumos</button>
      <button ngbDropdownItem (click)="cambiarVista('PRECIOS_SUCURSAL')">Precios por Sucursal</button>
    </div>
  </div>

  <button class="btn btn-danger d-flex align-items-center gap-2" (click)="ejecutarAccionPrincipal()">
    <i class="bi bi-plus-lg"></i> {{ textoBotonNuevo }}
  </button>

</app-action-bar>

<section class="py-3">
  <div class="container">
    <div class="vista-container">
      
      @switch (vistaActual) {
        
        @case ('PRODUCTOS') {
          <app-producto-gestion #productosGestion></app-producto-gestion>
        }
        
        @case ('CATEGORIAS') {
          <app-categorias #categoriasGestion></app-categorias>
        }
        
        @case ('INSUMOS') {
          <app-insumos #insumosGestion></app-insumos>
        }
        
        @case ('PRECIOS_SUCURSAL') {
          <div class="alert alert-info">Pantalla de configuración de precios en construcción...</div>
        }
      }

    </div>
  </div>
</section>
